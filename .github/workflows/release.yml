name: Create Release (from Python build artifacts)

on:
  workflow_run:
    # IMPORTANT: Must match the displayed name of your build workflow in THIS repo
    workflows: ["Build (Python)"]
    types: [completed]

concurrency:
  group: release-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

jobs:
  release:
    name: Create GitHub Release from artifacts
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}

    steps:
      - name: Checkout for tag resolution
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history for tags

      - name: Ensure tags are fetched
        run: git fetch --tags --force --prune

      - name: Resolve tag from head_sha
        id: findtag
        shell: bash
        env:
           HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
           TAG_REGEX: '^v[0-9]+\.[0-9]+\.[0-9]+$'
        run: |
          set -euo pipefail
          SHA="$HEAD_SHA"
          TAG=""
          
          # Find a tag pointing at this commit that matches regex
          for t in $(git tag --points-at "$SHA"); do
             if [[ "$t" =~ $TAG_REGEX ]]; then
                TAG="$t"
                break
             fi
          done

          if [[ -n "$TAG" ]]; then
            echo "is_tag=true" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG"    >> "$GITHUB_OUTPUT"
            echo "Detected tag: $TAG"
          else
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
            echo "No matching tag found for $SHA"
          fi

      - name: Download artifacts from source run
        if: steps.findtag.outputs.is_tag == 'true'
        uses: actions/download-artifact@v7
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ./artifacts

      - name: Rename artifacts
        if: steps.findtag.outputs.is_tag == 'true'
        shell: bash
        run: |
          TAG="${{ steps.findtag.outputs.tag }}"
          # Rename zip artifact
          if [ -f "artifacts/python-scripts/python-scripts.zip" ]; then
             mv "artifacts/python-scripts/python-scripts.zip" "artifacts/python-scripts/raindance-pdfdecode-python-scripts-${TAG}.zip"
             echo "Renamed artifact to raindance-pdfdecode-python-scripts-${TAG}.zip"
          else
             echo "Warning: artifacts/python-scripts/python-scripts.zip not found"
             ls -R artifacts
          fi
          # Update filename reference in assets.md
          if [ -f "artifacts/python-scripts-assets/assets.md" ]; then
             sed -i "s/python-scripts\.zip/raindance-pdfdecode-python-scripts-${TAG}.zip/g" \
               artifacts/python-scripts-assets/assets.md
          fi

      - name: Create/Update release
        if: steps.findtag.outputs.is_tag == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.findtag.outputs.tag }}
          name:     ${{ steps.findtag.outputs.tag }}
          body_path: artifacts/python-scripts-assets/assets.md
          append_body: true
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            artifacts/python-scripts/raindance-pdfdecode-python-scripts-*.zip
            artifacts/python-scripts-assets/assets.txt



